# Netlify configuration for SiMplyKhmenglish

[build]
  publish = "."

# After signup form — redirect to the app
[[redirects]]
  from = "/english-coach"
  to   = "/english-coach.html"
  status = 200

# /app shortcut also goes to the coach
[[redirects]]
  from = "/app"
  to   = "/english-coach.html"
  status = 200
